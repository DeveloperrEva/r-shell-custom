name: Release

# Fork build pipeline: builds signed macOS (Apple Silicon) + Linux (x86_64)
# bundles and attaches them (with updater artifacts) to the GitHub release for
# the tag. Trigger by pushing a tag `vX.Y.Z`, or manually via workflow_dispatch
# for an existing tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build & attach to (e.g. v2.5.2)'
        required: true
        default: v2.5.2

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14        # Apple Silicon runner
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04    # Linux x86_64
            target: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential curl wget file

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build & release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: 'r-shell-custom __VERSION__ (macOS + Linux)'
          releaseBody: |
            Personal fork of r-shell for macOS (Apple Silicon) and Linux.
            Download the `.dmg` (macOS) or `.AppImage` / `.deb` (Linux).
            Auto-updater artifacts (`latest.json`, `*.sig`) are included.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
